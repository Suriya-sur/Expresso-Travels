<!DOCTYPE html>
<html>
<head>
<title>TripLink</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>🚗 TripLink</h1>
<p>Find Vehicles Anytime</p>
</header>

<div class="container">

<input type="text" placeholder="Pickup Location" id="pickup">

<input type="text" placeholder="Drop Location" id="drop">

<select id="vehicle">
<option>Bike</option>
<option>Auto</option>
<option>Car</option>
<option>SUV</option>
<option>Van</option>
</select>

<button onclick="bookRide()">Book Ride</button>

</div>

<script src="app.js"></script>

</body>
</html>
